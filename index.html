<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Щоденник тренувань</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Треную">
<meta name="theme-color" content="#0f1115">
<style>
:root{
  --bg:#0f1115; --card:#1a1e27; --card2:#232836; --line:#2c3242; --grid:#262b38;
  --txt:#e8ebf2; --mut:#8a93a6; --acc:#4f8cff; --acc2:#2f6fe0;
  --ok:#3ddc84; --warn:#ffb020; --bad:#ff5d5d;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:16px; overscroll-behavior-y:none}
body{padding-bottom:calc(74px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:5;background:rgba(15,17,21,.92);
  backdrop-filter:blur(10px);padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
header h1{font-size:18px;margin:0;font-weight:700;display:flex;align-items:center;gap:8px}
header .date{color:var(--mut);font-size:14px}
.back{border:none;background:var(--card2);color:var(--acc);border-radius:10px;
  padding:6px 12px;font-size:15px;cursor:pointer}
main{padding:14px 14px 20px;max-width:560px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:14px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;
  background:var(--acc);color:#fff;font-size:17px;font-weight:700;cursor:pointer}
.btn:active{background:var(--acc2)}
.btn.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line);font-weight:600}
.btn.small{padding:10px;font-size:15px;border-radius:12px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.stepper{display:flex;align-items:center;gap:8px;background:var(--card2);
  border:1px solid var(--line);border-radius:14px;padding:6px}
.stepper button{width:52px;height:52px;border:none;border-radius:11px;background:var(--card);
  color:var(--acc);font-size:24px;font-weight:700;cursor:pointer;flex:none}
.stepper button:active{background:#11141b}
.stepper .val{flex:1;text-align:center}
.stepper .val input{width:100%;background:none;border:none;color:var(--txt);
  font-size:26px;font-weight:800;text-align:center;outline:none;padding:0}
.stepper .val .lbl{font-size:12px;color:var(--mut)}
#exBtn{display:flex;justify-content:space-between;align-items:center;background:var(--card2);
  border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer}
#exBtn .n{font-size:17px;font-weight:700}
#exBtn .g{color:var(--mut);font-size:13px}
.sheet{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.55);display:none}
.sheet.open{display:block}
.sheet .panel{position:absolute;left:0;right:0;bottom:0;max-height:84vh;overflow:auto;
  background:var(--card);border-radius:20px 20px 0 0;padding:14px 14px calc(20px + env(safe-area-inset-bottom))}
.sheet h2{font-size:17px;margin:2px 4px 12px}
.exgroup{color:var(--acc);font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;margin:14px 4px 6px}
.exitem{padding:13px 12px;border-radius:12px;background:var(--card2);margin-bottom:6px;cursor:pointer}
.exitem .nn{font-weight:600}
.exitem .nt{color:var(--mut);font-size:13px;margin-top:2px}
.exitem.knee .nn::after{content:' ⚠️'}
.set{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.set:last-child{border-bottom:none}
.set .num{width:26px;height:26px;border-radius:50%;background:var(--card2);color:var(--mut);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex:none}
.set .wr{flex:1;font-size:17px;font-weight:700}
.set .wr small{color:var(--mut);font-weight:400}
.set .pen{color:var(--mut);font-size:15px}
.hint{color:var(--mut);font-size:14px;line-height:1.5}
.kneebar{display:flex;gap:8px;margin-top:10px}
.kneebar button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);
  background:var(--card2);color:var(--txt);font-size:15px;cursor:pointer}
.kneebar button.on-ok{background:rgba(61,220,132,.16);border-color:var(--ok);color:var(--ok)}
.kneebar button.on-warn{background:rgba(255,176,32,.16);border-color:var(--warn);color:var(--warn)}
.kneebar button.on-bad{background:rgba(255,93,93,.16);border-color:var(--bad);color:var(--bad)}
nav{position:fixed;left:0;right:0;bottom:0;z-index:10;display:flex;
  background:rgba(20,23,30,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);
  padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
nav button{flex:1;border:none;background:none;color:var(--mut);font-size:11px;
  padding:6px 2px;cursor:pointer;border-radius:10px}
nav button .ic{display:block;font-size:22px;margin-bottom:2px}
nav button.act{color:var(--acc)}
/* дні програми */
.chips{display:flex;gap:8px;margin-bottom:12px}
.chip{flex:1;padding:12px 4px;border-radius:13px;border:1px solid var(--line);
  background:var(--card);color:var(--mut);font-size:15px;font-weight:700;cursor:pointer;text-align:center}
.chip.on{background:rgba(79,140,255,.16);border-color:var(--acc);color:var(--acc)}
.pl{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.pl:last-child{border-bottom:none}
.pl.cur{background:rgba(79,140,255,.07);border-radius:10px;padding-left:8px;padding-right:8px}
.pl .st{flex:none;display:flex;gap:3px}
.pl .st i{width:9px;height:9px;border-radius:50%;background:var(--card2);border:1px solid var(--line);display:block}
.pl .st i.f{background:var(--acc);border-color:var(--acc)}
.pl .nm{flex:1;min-width:0}
.pl .nm .t{font-weight:700;font-size:15px}
.pl .nm .t.done{color:var(--ok)}
.pl .nm .p{color:var(--mut);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl .cnt{flex:none;font-size:13px;color:var(--mut);font-weight:700}
.pl .cnt.done{color:var(--ok)}
/* прогрес */
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 10px}
.kpi .v{font-size:21px;font-weight:800}
.kpi .l{font-size:11px;color:var(--mut);margin-top:2px}
.kpi .d{font-size:12px;font-weight:700;margin-top:3px}
.up{color:var(--ok)} .down{color:var(--bad)} .flat{color:var(--mut)}
.pex{display:flex;justify-content:space-between;align-items:center;
  padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.pex:last-child{border-bottom:none}
.pex .t{font-weight:700}
.pex .s{color:var(--mut);font-size:13px;margin-top:3px}
.pex .arr{color:var(--mut)}
.prs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pr{background:var(--card2);border-radius:12px;padding:10px}
.pr .v{font-size:19px;font-weight:800}
.pr .v small{font-size:13px;color:var(--mut);font-weight:600}
.pr .l{font-size:11px;color:var(--mut);margin-top:2px}
.goal{margin-top:10px;background:var(--card2);border-radius:12px;padding:11px}
.goal .bar{height:8px;border-radius:4px;background:var(--card);margin-top:8px;overflow:hidden}
.goal .bar i{display:block;height:100%;border-radius:4px;background:var(--acc)}
.chart{position:relative;margin-top:4px}
.chart svg{display:block;width:100%;height:auto}
#chtip{position:fixed;z-index:30;background:#0b0d12;border:1px solid var(--line);
  border-radius:10px;padding:7px 10px;font-size:13px;pointer-events:none;display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.5)}
#chtip b{display:block;font-size:14px}
/* календар */
.cal{user-select:none}
.cal .chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cal .chead b{font-size:16px;text-transform:capitalize}
.cal .chead button{border:none;background:var(--card2);color:var(--acc);width:36px;height:36px;
  border-radius:10px;font-size:18px;cursor:pointer}
.cal table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal th{color:var(--mut);font-size:11px;font-weight:600;padding:4px 0}
.cal td{text-align:center;padding:2px 0}
.cal .dc{width:38px;height:38px;line-height:38px;margin:0 auto;border-radius:50%;
  font-size:14px;position:relative;cursor:default;color:var(--mut)}
.cal .dc.has{color:var(--txt);font-weight:700;background:var(--card2);cursor:pointer}
.cal .dc.has::after{content:'';position:absolute;left:50%;bottom:3px;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--acc)}
.cal .dc.today{box-shadow:inset 0 0 0 1.5px var(--acc)}
.cal .dc.sel{background:var(--acc);color:#fff}
.cal .dc.sel::after{background:#fff}
.day{margin-bottom:10px}
.day .dh{display:flex;justify-content:space-between;color:var(--mut);font-size:14px;
  font-weight:600;padding:4px 2px 8px;cursor:pointer}
input.txt{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  color:var(--txt);font-size:17px;padding:13px;outline:none}
input.txt[type=date]{color-scheme:dark}
.stat{display:flex;justify-content:space-between;padding:9px 2px;border-bottom:1px solid var(--line);font-size:15px}
.stat:last-child{border-bottom:none}
.badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:20px;background:var(--card2);color:var(--mut)}
.badge.day{background:rgba(79,140,255,.16);color:var(--acc)}
.empty{text-align:center;color:var(--mut);padding:30px 10px;line-height:1.6}
/* чат з тренером */
.chatwrap{display:flex;flex-direction:column;gap:8px;padding:4px 0 10px}
.msg{max-width:86%;padding:10px 13px;border-radius:15px;font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.msg.me{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:5px}
.msg.ai{align-self:flex-start;background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg.sys{align-self:center;color:var(--mut);font-size:12.5px;text-align:center;max-width:95%}
.msg .mt{display:block;font-size:11px;opacity:.65;margin-top:4px}
.chatin{display:flex;gap:8px;margin-top:6px}
.chatin input{flex:1}
.chatin button{flex:0 0 96px}
/* таймер відпочинку */
#timerBar{position:fixed;left:10px;right:10px;bottom:calc(76px + env(safe-area-inset-bottom));
  z-index:15;display:none;align-items:center;gap:10px;background:#101a2e;
  border:1px solid var(--acc);border-radius:16px;padding:10px 12px;
  box-shadow:0 6px 20px rgba(0,0,0,.55)}
#timerBar.show{display:flex}
#timerBar.done{border-color:var(--ok);background:#0e2318}
#timerBar .tt{flex:1}
#timerBar .tt b{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
#timerBar .tt span{display:block;font-size:11px;color:var(--mut)}
#timerBar button{border:none;border-radius:10px;background:var(--card2);color:var(--txt);
  padding:10px 12px;font-size:14px;font-weight:700;cursor:pointer}
#timerBar .x{color:var(--mut)}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:15px}
.setrow:last-child{border-bottom:none}
.setrow .ctr{display:flex;align-items:center;gap:8px}
.setrow .ctr button{border:none;background:var(--card2);color:var(--acc);width:38px;height:38px;
  border-radius:10px;font-size:19px;font-weight:700;cursor:pointer}
.setrow .ctr b{min-width:64px;text-align:center}
</style>
</head>
<body data-palette="#4f8cff">
<header>
  <h1 id="hTitle">Тренування</h1>
  <span class="date" id="hDate"></span>
</header>
<main id="main"></main>

<nav>
  <button id="tab-log" onclick="go('log')"><span class="ic">🏋️</span>Сьогодні</button>
  <button id="tab-hist" onclick="go('hist')"><span class="ic">📅</span>Історія</button>
  <button id="tab-prog" onclick="go('prog')"><span class="ic">📈</span>Прогрес</button>
  <button id="tab-coach" onclick="go('coach')"><span class="ic">🤖</span>Тренер</button>
  <button id="tab-more" onclick="go('more')"><span class="ic">⚙️</span>Ще</button>
</nav>

<div class="sheet" id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="panel" id="sheetBody"></div>
</div>
<div id="chtip"></div>
<div id="timerBar">
  <div class="tt"><b id="tVal">0:00</b><span id="tLbl">відпочинок</span></div>
  <button onclick="timerAdd(-30)">−30</button>
  <button onclick="timerAdd(30)">+30</button>
  <button class="x" onclick="stopTimer()">✕</button>
</div>

<script>
'use strict';
/* ---------- дані ---------- */
/* [назва, група, коліно, нотатка, відпочинок сек] */
const EXES = [
 ['Жим лежачи','Груди',0,'було 70×4 — вертайся з ~50 кг',180],
 ['Жим гантелей лежачи','Груди',0,'безпечніше після перерви',150],
 ['Жим у тренажері на груди','Груди',0,'для входу перші тижні',120],
 ['Кросовер / розведення','Груди',0,'ізоляція, в кінці',90],
 ['Тяга вертикального блока','Спина',0,'було 53×11 — старт 40–45',150],
 ['Тяга горизонтального блока','Спина',0,'було 59×8 — старт 45–50',150],
 ['Підтягування / гравітрон','Спина',0,'широка спина — твій актив',150],
 ['Тяга гантелі в нахилі','Спина',0,'з упором, спина рівна',120],
 ['Жим гантелей сидячи','Плечі',0,'основна на плечі',120],
 ['Махи гантелями в сторони','Плечі',0,'легка вага, чисто',90],
 ['Махи в кросовері','Плечі',0,'було 11×12',90],
 ['Розведення в нахилі (задня дельта)','Плечі',0,'для балансу і постави',90],
 ['Біцепс з гантелями','Руки',0,'було 17,5×8 — старт 12–14',90],
 ['Біцепс на блоці','Руки',0,'альтернатива гантелям',90],
 ['Трицепс на кросовері','Руки',0,'було 59×14',90],
 ['Французький жим / розгинання','Руки',0,'друга на трицепс',90],
 ['Жим ногами','Ноги',1,'КОЛІНО: коротка амплітуда, без болю',150],
 ['Розгинання ніг','Ноги',1,'КОЛІНО: дуже легко',90],
 ['Згинання ніг лежачи','Ноги',1,'зазвичай не чіпає коліно',90],
 ['Румунська тяга з гантелями','Ноги',1,'коліна майже прямі',120],
 ['Сідничний міст / hip thrust','Ноги',1,'без навантаження на коліно',120],
 ['Гоблет-присід','Ноги',1,'тільки коли коліно ок',120],
 ['Литки стоячи','Ноги',0,'безпечно для коліна',60],
 ['Планка','Кор',0,'у «повтори» пиши секунди',60],
 ['Скручування на блоці','Кор',0,'прес із навантаженням',60],
 ['Підйом ніг у висі','Кор',0,'низ преса',60],
];
const BASE_DATE='2026-02-15';
const BASELINE=[
 ['Жим лежачи',[[35,10],[60,12],[65,8],[70,4]]],
 ['Тяга горизонтального блока',[[35,12],[59,8],[59,8],[59,8]]],
 ['Тяга вертикального блока',[[53,11],[53,9],[53,9]]],
 ['Махи в кросовері',[[11,12],[11,12],[11,10]]],
 ['Біцепс з гантелями',[[17.5,8],[17.5,7],[15,10]]],
 ['Трицепс на кросовері',[[59,14],[59,12],[65,11]]],
];
const DEF_PROG = {
 'A':[{ex:'Жим лежачи',n:4},{ex:'Тяга горизонтального блока',n:4},{ex:'Жим гантелей сидячи',n:3},
      {ex:'Розгинання ніг',n:3},{ex:'Трицепс на кросовері',n:3},{ex:'Планка',n:3}],
 'B':[{ex:'Тяга вертикального блока',n:4},{ex:'Жим ногами',n:3},{ex:'Згинання ніг лежачи',n:3},
      {ex:'Махи гантелями в сторони',n:3},{ex:'Біцепс з гантелями',n:3},{ex:'Скручування на блоці',n:3}],
 'C':[{ex:'Жим гантелей лежачи',n:4},{ex:'Тяга гантелі в нахилі',n:4},{ex:'Румунська тяга з гантелями',n:3},
      {ex:'Розведення в нахилі (задня дельта)',n:3},{ex:'Сідничний міст / hip thrust',n:3},{ex:'Підйом ніг у висі',n:3}],
};
const KEY='gymlog-denys-v1';
let S = load();
function load(){
  let s=null;
  try{ s = JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(!s || !s.sets){
    s = {sets:[], bw:[{d:'2026-07-20',kg:76}], custom:[]};
    BASELINE.forEach(([ex,arr])=>arr.forEach(([w,r])=>
      s.sets.push({d:BASE_DATE,ex,w,r,knee:null,base:1})));
  }
  if(!s.prog) s.prog = JSON.parse(JSON.stringify(DEF_PROG));
  if(!s.days) s.days = {};
  if(!s.goals) s.goals = {'Жим лежачи':100};
  if(!s.rest) s.rest = 120;
  if(s.snd===undefined) s.snd = true;
  if(s.restAuto===undefined) s.restAuto = true;
  if(s.syncUrl===undefined) s.syncUrl = '';
  if(!s.pending) s.pending = [];
  if(s.dirty===undefined) s.dirty = false;
  if(s.lastSync===undefined) s.lastSync = null;
  if(!s.advice) s.advice = null;   // {text, date}
  if(!s.chat) s.chat = [];         // [{who:'me'|'ai'|'sys', t, ts}]
  if(s.lastChatTs===undefined) s.lastChatTs = 0;
  return s;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function allEx(){ return EXES.map(e=>({n:e[0],g:e[1],knee:!!e[2],note:e[3],rest:e[4]}))
  .concat(S.custom.map(n=>({n,g:'Мої вправи',knee:false,note:'',rest:null}))); }
function exInfo(n){ return allEx().find(e=>e.n===n) || {n,g:'',knee:false,note:'',rest:null}; }
function exRest(n){ const e=exInfo(n); return (S.restAuto && e.rest) ? e.rest : S.rest; }
const mmss = s => Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

/* ---------- утиліти ---------- */
const todayISO = () => { const t=new Date(); return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); };
const fmtD = iso => { const [y,m,d]=iso.split('-'); return d+'.'+m+'.'+y.slice(2); };
const fmtDs = iso => { const [,m,d]=iso.split('-'); return d+'.'+m; };
const fmtW = w => (Math.round(w*100)/100).toString().replace('.',',');
const fmtN = n => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
const e1rm = (w,r) => Math.round(w*(1+r/30)*10)/10;
const uniqDays = sets => [...new Set(sets.map(s=>s.d))];
const esc = s => s.replace(/'/g,"\\'");
const MONTHS=['січень','лютий','березень','квітень','травень','червень','липень','серпень','вересень','жовтень','листопад','грудень'];
function weekStart(iso){ const dt=new Date(iso+'T12:00:00');
  const wd=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-wd);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function dayLabel(iso){ const d=S.days[iso]; return d?('День '+d):null; }

/* ---------- стан ---------- */
let cur = { ex:null, w:50, r:10, knee:null };
let view = 'log';
let progEx = null;

/* ---------- навігація ---------- */
function go(v){ view=v; progEx=null; hideTip(); render(); }
function render(){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('act'));
  document.getElementById('tab-'+view).classList.add('act');
  document.getElementById('hDate').textContent = fmtD(todayISO());
  const titles={log:'Тренування',hist:'Історія',prog:'Прогрес',coach:'Твій тренер',more:'Налаштування'};
  const h1=document.getElementById('hTitle');
  if(view==='prog' && progEx){
    h1.innerHTML = `<button class="back" onclick="progEx=null;render()">‹ Назад</button>`;
  } else h1.textContent = titles[view];
  const m=document.getElementById('main');
  if(view==='log') m.innerHTML=vLog();
  if(view==='hist') m.innerHTML=vHist();
  if(view==='prog') m.innerHTML= progEx ? vExDetail(progEx) : vProg();
  if(view==='coach'){ m.innerHTML=vCoach(); pollChat();
    setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),50); }
  if(view==='more') m.innerHTML=vMore();
}

/* ---------- графіки ---------- */
function lineChart(pts, unit, opts={}, W=520, H=200){
  if(pts.length<2 && !opts.goal){ return `<div class="hint" style="padding:8px 2px">Замало даних для графіка — потрібно хоча б 2 тренування.</div>`; }
  if(pts.length<1){ return `<div class="hint" style="padding:8px 2px">Ще нема даних.</div>`; }
  const P={l:38,r:14,t:16,b:26};
  const ys=pts.map(p=>p.y);
  let y0=Math.min(...ys), y1=Math.max(...ys);
  if(opts.goal){ y1=Math.max(y1,opts.goal); }
  const pad=(y1-y0)*0.15 || y1*0.1 || 1; y0=Math.max(0,y0-pad); y1+=pad;
  const xs=pts.map(p=>new Date(p.d).getTime());
  const x0=Math.min(...xs), x1=Math.max(...xs)||x0+1;
  const X=t=>P.l+(W-P.l-P.r)*(x1===x0?0.5:(t-x0)/(x1-x0));
  const Y=v=>P.t+(H-P.t-P.b)*(1-(v-y0)/(y1-y0));
  let g='';
  for(let i=0;i<3;i++){ const v=y0+(y1-y0)*i/2, y=Y(v);
    g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>
        <text x="${P.l-6}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--mut)">${Math.round(v)}</text>`; }
  // лінія цілі
  let goal='';
  if(opts.goal){
    const gy=Y(opts.goal);
    goal=`<line x1="${P.l}" y1="${gy}" x2="${W-P.r}" y2="${gy}" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="6 5"/>
      <text x="${W-P.r}" y="${gy-5}" text-anchor="end" font-size="11" font-weight="700" fill="var(--warn)">🎯 ціль ${fmtW(opts.goal)}</text>`;
  }
  const path=pts.map((p,i)=>(i?'L':'M')+X(new Date(p.d).getTime()).toFixed(1)+' '+Y(p.y).toFixed(1)).join(' ');
  // рекорд
  const maxY=Math.max(...ys);
  const prIdx=pts.findIndex(p=>p.y===maxY);
  let dots='';
  pts.forEach((p,i)=>{ const x=X(new Date(p.d).getTime()), y=Y(p.y);
    const isPR = i===prIdx && pts.length>1;
    dots+=`<circle cx="${x}" cy="${y}" r="${isPR?4.5:3.5}" fill="${p.base?'var(--mut)':(isPR?'var(--ok)':'var(--acc)')}" stroke="var(--card)" stroke-width="2"/>`;
    if(isPR) dots+=`<text x="${x}" y="${y-9}" text-anchor="middle" font-size="11" font-weight="800" fill="var(--ok)">PR ${fmtW(p.y)}</text>`;
    dots+=`<circle cx="${x}" cy="${y}" r="16" fill="transparent" style="cursor:pointer"
             onclick="showTip(event,'${fmtD(p.d)}${p.base?' (до перерви)':''}','${fmtW(p.y)} ${unit}')"/>`; });
  const lp=pts[pts.length-1];
  const lastLbl = prIdx===pts.length-1 ? '' :
    `<text x="${Math.min(X(new Date(lp.d).getTime())+8,W-P.r-2)}" y="${Y(lp.y)+18}"
     font-size="12" font-weight="700" fill="var(--txt)" text-anchor="end">${fmtW(lp.y)}</text>`;
  const line = pts.length>1 ? `<path d="${path}" fill="none" stroke="var(--acc)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>` : '';
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}">
    ${g}${goal}
    <text x="${P.l}" y="${H-6}" font-size="11" fill="var(--mut)">${fmtDs(pts[0].d)}</text>
    <text x="${W-P.r}" y="${H-6}" font-size="11" fill="var(--mut)" text-anchor="end">${fmtDs(lp.d)}</text>
    ${line}${dots}${lastLbl}
  </svg></div>`;
}
function barChart(items, unit, W=520, H=190){
  if(!items.some(i=>i.y>0)) return `<div class="hint" style="padding:8px 2px">Поки нема тренувань за ці тижні.</div>`;
  const P={l:6,r:6,t:22,b:22};
  const max=Math.max(...items.map(i=>i.y));
  const n=items.length, gap=8;
  const bw=(W-P.l-P.r-gap*(n-1))/n;
  const Y=v=>P.t+(H-P.t-P.b)*(1-v/max);
  let bars='';
  const maxIdx=items.findIndex(i=>i.y===max);
  items.forEach((it,i)=>{
    const x=P.l+i*(bw+gap), y=Y(it.y), bh=H-P.b-y;
    if(it.y>0){
      const r=Math.min(4,bh);
      bars+=`<path d="M${x} ${H-P.b} V${y+r} Q${x} ${y} ${x+r} ${y} H${x+bw-r} Q${x+bw} ${y} ${x+bw} ${y+r} V${H-P.b} Z"
        fill="${i===n-1?'var(--acc)':'#3a557f'}"/>`;
    } else {
      bars+=`<rect x="${x}" y="${H-P.b-2}" width="${bw}" height="2" rx="1" fill="var(--grid)"/>`;
    }
    bars+=`<rect x="${x-2}" y="${P.t-14}" width="${bw+4}" height="${H-P.t-P.b+30}" fill="transparent" style="cursor:pointer"
       onclick="showTip(event,'${it.tip}','${fmtN(it.y)} ${unit}')"/>`;
    if((i===maxIdx || i===n-1) && it.y>0){
      bars+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="11" font-weight="700"
        fill="var(--txt)">${it.y>=10000?Math.round(it.y/1000)+'к':fmtN(it.y)}</text>`;
    }
    bars+=`<text x="${x+bw/2}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--mut)">${it.lbl}</text>`;
  });
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}">
    <line x1="${P.l}" y1="${H-P.b}" x2="${W-P.r}" y2="${H-P.b}" stroke="var(--grid)" stroke-width="1"/>
    ${bars}</svg></div>`;
}
function showTip(ev,l1,l2){
  ev.stopPropagation();
  const t=document.getElementById('chtip');
  t.innerHTML=`<b>${l2}</b>${l1}`;
  t.style.display='block';
  const x=Math.min(Math.max(ev.clientX-50,8), window.innerWidth-120);
  t.style.left=x+'px'; t.style.top=(ev.clientY-64)+'px';
  clearTimeout(t._h); t._h=setTimeout(hideTip,2500);
}
function hideTip(){ const t=document.getElementById('chtip'); if(t) t.style.display='none'; }
document.addEventListener('scroll',hideTip,true);

/* ---------- екран: сьогодні ---------- */
function lastSession(ex, sameDay){
  let pool = S.sets.filter(s=>s.ex===ex && s.d!==todayISO());
  if(sameDay){ const p2=pool.filter(s=>S.days[s.d]===sameDay); if(p2.length) pool=p2; }
  const days = uniqDays(pool).sort();
  if(!days.length) return null;
  const d = days[days.length-1];
  return {d, sets:pool.filter(s=>s.d===d)};
}
function vLog(){
  const day = S.days[todayISO()] || null;
  const e = cur.ex ? exInfo(cur.ex) : null;
  const last = cur.ex ? lastSession(cur.ex, day) : null;
  const today = S.sets.filter(s=>s.d===todayISO());
  const byEx = {};
  today.forEach(s=>{ (byEx[s.ex]=byEx[s.ex]||[]).push(s); });
  // вибір дня
  let h = `<div class="chips">`;
  ['A','B','C'].forEach(d=>{
    h+=`<div class="chip ${day===d?'on':''}" onclick="pickDay('${d}')">День ${d}</div>`;
  });
  h+=`<div class="chip ${!day?'on':''}" onclick="pickDay(null)">Вільне</div></div>`;
  // чек-ліст програми
  if(day && S.prog[day] && S.prog[day].length){
    const items=S.prog[day];
    const doneEx=items.filter(it=>(byEx[it.ex]||[]).length>=it.n).length;
    h+=`<div class="card"><h3>План · день ${day} · ${doneEx}/${items.length} вправ ✓</h3>`;
    items.forEach(it=>{
      const done=(byEx[it.ex]||[]).length;
      const full=done>=it.n;
      const prev=lastSession(it.ex, day);
      let dots='';
      for(let i=0;i<it.n;i++) dots+=`<i class="${i<done?'f':''}"></i>`;
      h+=`<div class="pl ${cur.ex===it.ex?'cur':''}" onclick="pickEx('${esc(it.ex)}')">
        <div class="st">${dots}</div>
        <div class="nm"><div class="t ${full?'done':''}">${full?'✅ ':''}${it.ex}</div>
          ${prev?`<div class="p">минулого: ${prev.sets.map(s=>fmtW(s.w)+'×'+s.r).join(', ')}</div>`:''}</div>
        <div class="cnt ${full?'done':''}">${done}/${it.n}</div></div>`;
    });
    h+=`<div class="hint" style="margin-top:8px">Тапни вправу — і логуй підходи нижче. Кружечки заповнюються самі. Редагувати план: «Ще» → Програма.</div></div>`;
  }
  // картка вводу
  h += `<div class="card">
    <div id="exBtn" onclick="openExSheet('pick')">
      <div><div class="n">${e?e.n:'Обери вправу'}</div>
      <div class="g">${e?(e.g+(e.note?' · '+e.note:'')+' · ⏱ '+mmss(exRest(e.n))):(day?'або тапни зі списку вище 👆':'тицьни сюди 👆')}</div></div>
      <div style="color:var(--mut)">▾</div>
    </div>`;
  if(e){
    h += `<div style="height:10px"></div>`;
    if(last) h += `<div class="hint">Минулого разу (${fmtD(last.d)}${S.days[last.d]?', день '+S.days[last.d]:''}): ${
      last.sets.map(s=>fmtW(s.w)+'×'+s.r).join(', ')}</div><div style="height:10px"></div>`;
    h += `<div class="row"><div class="stepper">
        <button onclick="bump('w',-2.5)">−</button>
        <div class="val"><input id="inW" inputmode="decimal" value="${fmtW(cur.w)}"
          onchange="cur.w=parseFloat(this.value.replace(',','.'))||0"><div class="lbl">кг</div></div>
        <button onclick="bump('w',2.5)">+</button>
      </div></div>
    <div style="height:8px"></div>
    <div class="row"><div class="stepper">
        <button onclick="bump('r',-1)">−</button>
        <div class="val"><input id="inR" inputmode="numeric" value="${cur.r}"
          onchange="cur.r=parseInt(this.value)||0"><div class="lbl">повтори</div></div>
        <button onclick="bump('r',1)">+</button>
      </div></div>`;
    if(e.knee){
      h += `<div class="kneebar">
        <button class="${cur.knee==='ок'?'on-ok':''}" onclick="setKnee('ок')">✅ ок</button>
        <button class="${cur.knee==='тягне'?'on-warn':''}" onclick="setKnee('тягне')">⚠️ тягне</button>
        <button class="${cur.knee==='біль'?'on-bad':''}" onclick="setKnee('біль')">🛑 біль</button>
      </div>`;
    }
    h += `<div style="height:12px"></div><button class="btn" onclick="addSet()">＋ Додати підхід</button>`;
  }
  h += `</div>`;
  // сьогоднішні підходи
  const exNames = Object.keys(byEx);
  if(exNames.length){
    h += `<div class="card"><h3>Сьогодні · ${today.length} підх. · ${fmtN(today.reduce((a,s)=>a+s.w*s.r,0))} кг тоннаж</h3>`;
    exNames.forEach(ex=>{
      h += `<div style="font-weight:700;margin:8px 0 2px">${ex}</div>`;
      byEx[ex].forEach((s)=>{
        const idx = S.sets.indexOf(s);
        h += `<div class="set" onclick="openEdit(${idx})"><div class="num">${byEx[ex].indexOf(s)+1}</div>
          <div class="wr">${fmtW(s.w)} кг × ${s.r}
            <small>· ${Math.round(s.w*s.r)} кг${s.knee?' · коліно: '+s.knee:''}</small></div>
          <span class="pen">✏️</span></div>`;
      });
    });
    h += `<div class="hint" style="margin-top:6px">Тапни підхід, щоб змінити чи видалити</div></div>`;
  } else if(!e && !day){
    h += `<div class="empty">Обери день програми (A/B/C) або вправу вручну 💪</div>`;
  }
  return h;
}
function pickDay(d){
  if(d===null) delete S.days[todayISO()];
  else S.days[todayISO()]=d;
  save(); render();
}
function bump(k,dv){
  cur[k] = Math.max(0, Math.round((cur[k]+dv)*100)/100);
  const el = document.getElementById(k==='w'?'inW':'inR');
  if(el) el.value = k==='w'?fmtW(cur.w):cur.r;
}
function setKnee(v){ cur.knee = cur.knee===v?null:v; render(); }
function addSet(){
  const wEl=document.getElementById('inW'), rEl=document.getElementById('inR');
  if(wEl) cur.w=parseFloat(wEl.value.replace(',','.'))||0;
  if(rEl) cur.r=parseInt(rEl.value)||0;
  if(!cur.ex || !cur.r) return;
  const num = S.sets.filter(x=>x.d===todayISO() && x.ex===cur.ex).length + 1;
  S.sets.push({d:todayISO(), ex:cur.ex, w:cur.w, r:cur.r, knee:cur.knee});
  if(S.syncUrl) S.pending.push({t:'set', d:todayISO(), ex:cur.ex, i:num, w:cur.w, r:cur.r, knee:cur.knee});
  save(); render();
  if(navigator.vibrate) navigator.vibrate(30);
  startTimer();
  trySync();
}

/* ---------- синхронізація з Google Таблицею ---------- */
let syncBusy=false;
function syncPost(payload){
  return fetch(S.syncUrl, {method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload)}).then(r=>r.json());
}
function trySync(){
  if(!S.syncUrl || !S.pending.length || syncBusy || !navigator.onLine) return;
  syncBusy=true;
  const batch=S.pending.slice();
  syncPost({action:'append', rows:batch})
    .then(j=>{ if(j && j.ok){
      S.pending = S.pending.slice(batch.length);
      S.lastSync = Date.now(); save();
      if(view==='more') render();
    }})
    .catch(()=>{})
    .finally(()=>{ syncBusy=false; });
}
function fullSync(){
  if(!S.syncUrl || syncBusy) return;
  syncBusy=true;
  const btn=document.getElementById('fsBtn'); if(btn) btn.textContent='Синхронізую…';
  const cnt={};
  const sets=[...S.sets].sort((a,b)=>a.d<b.d?-1:1).map(s=>{
    const k=s.d+'|'+s.ex; cnt[k]=(cnt[k]||0)+1;
    return {d:s.d, ex:s.ex, i:cnt[k], w:s.w, r:s.r, knee:s.knee||'', note:s.base?'до перерви — орієнтир':''};
  });
  const bw=[...S.bw].sort((a,b)=>a.d<b.d?-1:1).map(b=>({d:b.d,kg:b.kg}));
  syncPost({action:'replaceAll', sets, bw})
    .then(j=>{ if(j && j.ok){
      S.pending=[]; S.dirty=false; S.lastSync=Date.now(); save(); render();
    } else alert('Таблиця відповіла з помилкою: '+(j&&j.error||'?')); })
    .catch(()=>alert('Не вдалося достукатись до таблиці. Перевір інтернет і URL.'))
    .finally(()=>{ syncBusy=false; });
}
function setSyncUrl(){
  const el=document.getElementById('suIn');
  const v=(el.value||'').trim();
  if(v && !v.startsWith('https://script.google.com/')){
    alert('Це не схоже на URL веб-апки Apps Script (має починатися з https://script.google.com/…)');
    return;
  }
  S.syncUrl=v; save(); render();
  if(v) fullSync();
}
window.addEventListener('online', trySync);
let advFetched=0;
function fetchAdvice(force){
  if(!S.syncUrl || !navigator.onLine) return;
  if(!force && Date.now()-advFetched < 10*60*1000) return;
  advFetched=Date.now();
  fetch(S.syncUrl+'?q=advice').then(r=>r.json()).then(j=>{
    if(j && j.ok && j.text){
      if(!S.advice || S.advice.text!==j.text){
        S.advice={text:j.text, date:j.date}; save();
        if(view==='prog' && !progEx) render();
      }
    }
  }).catch(()=>{});
}
const escH = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ---------- таймер відпочинку ---------- */
let tEnd=null, tInt=null, audioCtx=null;
function ensureAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
function startTimer(){
  ensureAudio();                       // розблоковуємо звук жестом
  const dur = exRest(cur.ex);
  tEnd = Date.now() + dur*1000;
  const bar=document.getElementById('timerBar');
  bar.classList.add('show'); bar.classList.remove('done');
  document.getElementById('tLbl').textContent='відпочинок · '+cur.ex+
    (S.restAuto && exInfo(cur.ex).rest ? ' · рекомендовано '+mmss(dur) : '');
  clearInterval(tInt);
  tInt=setInterval(tick,250); tick();
}
function timerAdd(sec){
  if(!tEnd) return;
  tEnd += sec*1000;
  if(tEnd < Date.now()) tEnd = Date.now();
  tick();
}
function stopTimer(){
  clearInterval(tInt); tInt=null; tEnd=null;
  document.getElementById('timerBar').classList.remove('show');
}
function tick(){
  if(!tEnd) return;
  const left=Math.max(0, Math.round((tEnd-Date.now())/1000));
  const m=Math.floor(left/60), s=left%60;
  document.getElementById('tVal').textContent=m+':'+String(s).padStart(2,'0');
  if(left<=0){
    clearInterval(tInt); tInt=null; tEnd=null;
    const bar=document.getElementById('timerBar');
    bar.classList.add('done');
    document.getElementById('tVal').textContent='Го! 💪';
    document.getElementById('tLbl').textContent='відпочинок закінчився';
    if(navigator.vibrate) navigator.vibrate([300,150,300,150,300]);
    if(S.snd) ringBell();
    setTimeout(()=>{ bar.classList.remove('show'); bar.classList.remove('done'); }, 4000);
  }
}
function ringBell(){
  // ~3 секунди сигналу, вимикається сам
  try{
    ensureAudio();
    if(!audioCtx) return;
    const t0=audioCtx.currentTime;
    for(let i=0;i<4;i++){
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=880;
      o.connect(g); g.connect(audioCtx.destination);
      const ts=t0+i*0.8;
      g.gain.setValueAtTime(0.0001,ts);
      g.gain.exponentialRampToValueAtTime(0.5,ts+0.05);
      g.gain.exponentialRampToValueAtTime(0.0001,ts+0.55);
      o.start(ts); o.stop(ts+0.6);
    }
  }catch(e){}
}

  const e=exInfo(s.ex);
  let h=`<h2>${s.ex} · ${fmtD(s.d)}</h2>
  <div class="row"><div class="stepper">
    <button onclick="ebump('w',-2.5)">−</button>
    <div class="val"><input id="edW" inputmode="decimal" value="${fmtW(edt.w)}"
      onchange="edt.w=parseFloat(this.value.replace(',','.'))||0"><div class="lbl">кг</div></div>
    <button onclick="ebump('w',2.5)">+</button></div></div>
  <div style="height:8px"></div>
  <div class="row"><div class="stepper">
    <button onclick="ebump('r',-1)">−</button>
    <div class="val"><input id="edR" inputmode="numeric" value="${edt.r}"
      onchange="edt.r=parseInt(this.value)||0"><div class="lbl">повтори</div></div>
    <button onclick="ebump('r',1)">+</button></div></div>
  <div style="height:8px"></div>
  <input class="txt" type="date" id="edD" value="${edt.d}" onchange="edt.d=this.value">`;
  if(e.knee) h+=`<div class="kneebar">
    <button class="${edt.knee==='ок'?'on-ok':''}" onclick="eknee('ок')">✅ ок</button>
    <button class="${edt.knee==='тягне'?'on-warn':''}" onclick="eknee('тягне')">⚠️ тягне</button>
    <button class="${edt.knee==='біль'?'on-bad':''}" onclick="eknee('біль')">🛑 біль</button></div>`;
  h+=`<div style="height:14px"></div>
  <button class="btn" onclick="saveEdit()">Зберегти</button>
  <div style="height:8px"></div>
  <button class="btn ghost small" style="color:var(--bad)" onclick="deleteEdit()">🗑 Видалити підхід</button>`;
  document.getElementById('sheetBody').innerHTML=h;
  document.getElementById('sheet').classList.add('open');
}
function ebump(k,dv){
  edt[k]=Math.max(0,Math.round((edt[k]+dv)*100)/100);
  const el=document.getElementById(k==='w'?'edW':'edR');
  if(el) el.value = k==='w'?fmtW(edt.w):edt.r;
}
function eknee(v){ edt.knee = edt.knee===v?null:v; openEdit(edt.i); }
function saveEdit(){
  const wEl=document.getElementById('edW'), rEl=document.getElementById('edR'), dEl=document.getElementById('edD');
  if(wEl) edt.w=parseFloat(wEl.value.replace(',','.'))||0;
  if(rEl) edt.r=parseInt(rEl.value)||0;
  if(dEl && dEl.value) edt.d=dEl.value;
  const s=S.sets[edt.i];
  s.w=edt.w; s.r=edt.r; s.knee=edt.knee; s.d=edt.d;
  if(S.syncUrl) S.dirty=true;
  save(); closeSheet(); render();
}
function deleteEdit(){
  S.sets.splice(edt.i,1);
  if(S.syncUrl) S.dirty=true;
  save(); closeSheet(); render();
}

/* ---------- вибір вправи ---------- */
let sheetMode='pick';
function openExSheet(mode){
  sheetMode=mode||'pick';
  const groups={};
  allEx().forEach(e=>{ (groups[e.g]=groups[e.g]||[]).push(e); });
  let h = `<h2>${sheetMode==='pick'?'Вправа':'Додати вправу в день '+sheetMode.slice(5)}</h2>`;
  Object.keys(groups).forEach(g=>{
    h += `<div class="exgroup">${g}${g==='Ноги'?' (обережно з коліном)':''}</div>`;
    groups[g].forEach(e=>{
      h += `<div class="exitem ${e.knee?'knee':''}" onclick="sheetPick('${esc(e.n)}')">
        <div class="nn">${e.n}</div><div class="nt">${e.note?e.note+' · ':''}⏱ ${mmss(exRest(e.n))}</div></div>`;
    });
  });
  h += `<div style="height:8px"></div><button class="btn ghost small" onclick="addCustomEx()">＋ Своя вправа</button>`;
  document.getElementById('sheetBody').innerHTML=h;
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){ document.getElementById('sheet').classList.remove('open'); }
function sheetPick(n){
  if(sheetMode.startsWith('prog:')){
    const d=sheetMode.slice(5);
    S.prog[d].push({ex:n,n:3}); save();
    openProgEdit(d);
  } else pickEx(n);
}
function pickEx(n){
  cur.ex=n; cur.knee=null;
  const last=lastSession(n, S.days[todayISO()]||null);
  if(last){ const b=last.sets[last.sets.length-1]; cur.w=b.w; cur.r=b.r; }
  closeSheet(); render();
}
function addCustomEx(){
  const n=prompt('Назва вправи:');
  if(n && n.trim()){ S.custom.push(n.trim()); save(); sheetPick(n.trim()); }
}

/* ---------- редактор програми ---------- */
function openProgEdit(d){
  const items=S.prog[d];
  let h=`<h2>Програма · День ${d}</h2>`;
  if(!items.length) h+=`<div class="hint" style="padding:6px 4px">Поки порожньо — додай вправи.</div>`;
  items.forEach((it,i)=>{
    h+=`<div class="pl"><div class="nm"><div class="t">${it.ex}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="back" onclick="progN('${d}',${i},-1)">−</button>
        <b style="min-width:56px;text-align:center">${it.n} підх.</b>
        <button class="back" onclick="progN('${d}',${i},1)">+</button>
        <button class="back" style="color:var(--bad)" onclick="progDel('${d}',${i})">✕</button>
      </div></div>`;
  });
  h+=`<div style="height:10px"></div>
  <button class="btn ghost small" onclick="openExSheet('prog:${d}')">＋ Додати вправу</button>
  <div style="height:8px"></div>
  <button class="btn small" onclick="closeSheet();render()">Готово</button>`;
  document.getElementById('sheetBody').innerHTML=h;
  document.getElementById('sheet').classList.add('open');
}
function progN(d,i,dv){ S.prog[d][i].n=Math.max(1,S.prog[d][i].n+dv); save(); openProgEdit(d); }
function progDel(d,i){ S.prog[d].splice(i,1); save(); openProgEdit(d); }

/* ---------- історія: календар + список ---------- */
function vHist(){
  if(!calM){ const t=new Date(); calM=new Date(t.getFullYear(),t.getMonth(),1); }
  const wDays=uniqDays(S.sets);
  const y=calM.getFullYear(), m=calM.getMonth();
  const first=new Date(y,m,1);
  const startWd=(first.getDay()+6)%7;
  const dim=new Date(y,m+1,0).getDate();
  let cal=`<div class="card cal"><div class="chead">
    <button onclick="calShift(-1)">‹</button>
    <b>${MONTHS[m]} ${y}</b>
    <button onclick="calShift(1)">›</button></div>
    <table><tr>${['Пн','Вт','Ср','Чт','Пт','Сб','Нд'].map(d=>`<th>${d}</th>`).join('')}</tr><tr>`;
  for(let i=0;i<startWd;i++) cal+='<td></td>';
  let col=startWd;
  for(let d=1;d<=dim;d++){
    const iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has=wDays.includes(iso);
    const cls=['dc', has?'has':'', iso===todayISO()?'today':'', calSel===iso?'sel':''].join(' ');
    cal+=`<td><div class="${cls}" ${has?`onclick="calPick('${iso}')"`:''}>${d}</div></td>`;
    if(++col===7 && d<dim){ cal+='</tr><tr>'; col=0; }
  }
  cal+='</tr></table></div>';
  let h=cal;
  // вибраний день
  if(calSel && wDays.includes(calSel)){
    h+=dayCard(calSel, true);
  }
  // список останніх
  const recent=[...wDays].sort().reverse();
  if(!recent.length) return h+`<div class="empty">Ще нема записів</div>`;
  h+=`<div class="card"><h3>Останні тренування</h3>`;
  recent.slice(0,20).forEach(d=>{
    if(d===calSel) return;
    const sets=S.sets.filter(s=>s.d===d);
    const ton=Math.round(sets.reduce((a,s)=>a+s.w*s.r,0));
    const isBase=sets.some(s=>s.base);
    const lbl=dayLabel(d);
    h+=`<div class="stat" style="cursor:pointer" onclick="histToggle('${d}')">
      <span>${histOpen[d]?'▾':'▸'} ${fmtD(d)} ${lbl?`<span class="badge day">${lbl}</span>`:''}${isBase?' <span class="badge">до перерви</span>':''}</span>
      <b>${sets.length} підх. · ${fmtN(ton)} кг</b></div>`;
    if(histOpen[d]) h+=daySets(d);
  });
  h+=`</div><div class="hint" style="text-align:center;padding:4px">Тапни дату в календарі або рядок у списку</div>`;
  return h;
}
function calShift(dm){ calM=new Date(calM.getFullYear(),calM.getMonth()+dm,1); calSel=null; render(); }
function calPick(iso){ calSel = calSel===iso?null:iso; render(); }
function histToggle(d){ histOpen[d]=!histOpen[d]; render(); }
function daySets(d){
  const sets=S.sets.filter(s=>s.d===d);
  const byEx={}; sets.forEach(s=>{(byEx[s.ex]=byEx[s.ex]||[]).push(s);});
  let h='';
  Object.keys(byEx).forEach(ex=>{
    h+=`<div style="font-weight:700;padding:6px 2px 0">${ex}</div>`;
    byEx[ex].forEach(s=>{
      const idx=S.sets.indexOf(s);
      h+=`<div class="set" onclick="openEdit(${idx})">
        <div class="num">${byEx[ex].indexOf(s)+1}</div>
        <div class="wr" style="font-size:15px">${fmtW(s.w)} кг × ${s.r}
          <small>${s.knee?'· коліно: '+s.knee:''}</small></div>
        <span class="pen">✏️</span></div>`;
    });
  });
  return h;
}
function dayCard(d, withTitle){
  const sets=S.sets.filter(s=>s.d===d);
  const ton=Math.round(sets.reduce((a,s)=>a+s.w*s.r,0));
  const lbl=dayLabel(d);
  return `<div class="card"><h3>${fmtD(d)} ${lbl?`· ${lbl}`:''} · ${sets.length} підх. · ${fmtN(ton)} кг</h3>${daySets(d)}</div>`;
}

/* ---------- прогрес ---------- */
function weekAgg(offsetWeeks){
  const ws=weekStart(todayISO());
  const start=new Date(ws+'T12:00:00'); start.setDate(start.getDate()-7*offsetWeeks);
  const end=new Date(start); end.setDate(end.getDate()+7);
  const inW=S.sets.filter(s=>{ const t=new Date(s.d+'T12:00:00'); return t>=start && t<end; });
  return { sets:inW.length, ton:inW.reduce((a,s)=>a+s.w*s.r,0), days:uniqDays(inW).length,
    lbl: String(start.getDate()).padStart(2,'0')+'.'+String(start.getMonth()+1).padStart(2,'0') };
}
function delta(cur_,prev,unit){
  if(prev===0 && cur_===0) return `<span class="flat">—</span>`;
  const d=cur_-prev;
  if(d===0) return `<span class="flat">= як минулого</span>`;
  return d>0? `<span class="up">▲ +${fmtN(d)}${unit}</span>` : `<span class="down">▼ ${fmtN(d)}${unit}</span>`;
}
function vProg(){
  const tw=weekAgg(0), lw=weekAgg(1);
  let h=`<div class="kpis">
    <div class="kpi"><div class="v">${tw.days}</div><div class="l">тренувань цього тижня</div><div class="d">${delta(tw.days,lw.days,'')}</div></div>
    <div class="kpi"><div class="v">${tw.sets}</div><div class="l">підходів</div><div class="d">${delta(tw.sets,lw.sets,'')}</div></div>
    <div class="kpi"><div class="v">${fmtN(tw.ton)}</div><div class="l">тоннаж, кг</div><div class="d">${delta(tw.ton,lw.ton,'')}</div></div>
  </div>`;
  // порада від Claude
  if(S.syncUrl){
    fetchAdvice(false);
    if(S.advice && S.advice.text){
      h+=`<div class="card" style="border-color:#3a557f"><h3>🤖 Порада від Claude · ${S.advice.date?fmtD(S.advice.date):''}</h3>
        <div style="font-size:15px;line-height:1.55;white-space:pre-wrap">${escH(S.advice.text)}</div></div>`;
    }
  }
  const weeks=[];
  for(let i=7;i>=0;i--){ const w=weekAgg(i); weeks.push({lbl:w.lbl, y:Math.round(w.ton), tip:'тиждень з '+w.lbl}); }
  h+=`<div class="card"><h3>Тоннаж по тижнях, кг</h3>${barChart(weeks,'кг')}</div>`;
  const exs=[...new Set(S.sets.map(s=>s.ex))];
  if(exs.length){
    h+=`<div class="card"><h3>Вправи — тапни для графіка</h3>`;
    exs.sort((a,b)=>{
      const la=S.sets.filter(s=>s.ex===a).map(s=>s.d).sort().slice(-1)[0];
      const lb=S.sets.filter(s=>s.ex===b).map(s=>s.d).sort().slice(-1)[0];
      return la<lb?1:-1;
    });
    exs.forEach(ex=>{
      const ss=S.sets.filter(s=>s.ex===ex);
      const maxW=Math.max(...ss.map(s=>s.w));
      const best=Math.max(...ss.map(s=>e1rm(s.w,s.r)));
      const lastD=ss.map(s=>s.d).sort().slice(-1)[0];
      const g=S.goals[ex];
      h+=`<div class="pex" onclick="progEx='${esc(ex)}';render()">
        <div><div class="t">${ex}${g?` <span class="badge day">🎯 ${fmtW(g)}</span>`:''}</div>
        <div class="s">макс ${fmtW(maxW)} кг · 1ПМ ~${fmtW(best)} · ${fmtD(lastD)}</div></div>
        <div class="arr">›</div></div>`;
    });
    h+=`</div>`;
  }
  if(S.bw.length){
    const pts=[...S.bw].sort((a,b)=>a.d<b.d?-1:1).map(b=>({d:b.d,y:b.kg}));
    h+=`<div class="card"><h3>Вага тіла, кг</h3>${lineChart(pts,'кг')}
      <div class="hint">Записуй вагу у вкладці «Ще» 1–2 рази на тиждень.</div></div>`;
  }
  const knees = S.sets.filter(s=>s.knee && s.knee!=='ок');
  if(knees.length){
    h+=`<div class="card"><h3>Коліно ⚠️</h3>`;
    knees.slice(-5).reverse().forEach(s=>{
      h+=`<div class="stat"><span>${fmtD(s.d)} · ${s.ex}</span><b>${s.knee}</b></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

/* ---------- прогрес: вправа ---------- */
function vExDetail(ex){
  const ss=S.sets.filter(s=>s.ex===ex);
  if(!ss.length) return `<div class="empty">Нема записів</div>`;
  const days=uniqDays(ss).sort();
  const sess=days.map(d=>{
    const ds=ss.filter(s=>s.d===d);
    return { d, base:ds.some(s=>s.base), sets:ds,
      maxW:Math.max(...ds.map(s=>s.w)),
      best1:Math.max(...ds.map(s=>e1rm(s.w,s.r))),
      ton:ds.reduce((a,s)=>a+s.w*s.r,0) };
  });
  const prW=ss.reduce((a,s)=>s.w>a.w?s:a,ss[0]);
  const pr1=ss.reduce((a,s)=>e1rm(s.w,s.r)>e1rm(a.w,a.r)?s:a,ss[0]);
  const prTon=sess.reduce((a,s)=>s.ton>a.ton?s:a,sess[0]);
  const curS=sess.filter(s=>!s.base), baseS=sess.filter(s=>s.base);
  let cmp='';
  if(baseS.length && curS.length){
    const d=Math.round((Math.max(...curS.map(s=>s.best1))-Math.max(...baseS.map(s=>s.best1)))*10)/10;
    cmp = d>=0 ? `<span class="up">▲ +${fmtW(d)} кг до 1ПМ проти «до перерви»</span>`
               : `<span class="down">▼ ${fmtW(d)} кг до 1ПМ проти «до перерви» — нормально після паузи</span>`;
  }
  const g=S.goals[ex];
  let h=`<div class="card"><h3>${ex}</h3>
    <div class="prs">
      <div class="pr"><div class="v">${fmtW(prW.w)} <small>кг</small></div><div class="l">рекорд ваги · ${fmtD(prW.d)}</div></div>
      <div class="pr"><div class="v">${fmtW(e1rm(pr1.w,pr1.r))} <small>кг</small></div><div class="l">кращий 1ПМ (${fmtW(pr1.w)}×${pr1.r})</div></div>
      <div class="pr"><div class="v">${fmtN(prTon.ton)} <small>кг</small></div><div class="l">рекорд тоннажу · ${fmtD(prTon.d)}</div></div>
      <div class="pr"><div class="v">${sess.length}</div><div class="l">сесій всього</div></div>
    </div>
    ${cmp?`<div style="margin-top:10px;font-size:14px">${cmp}</div>`:''}`;
  // ціль
  if(g){
    const pct=Math.min(100,Math.round(prW.w/g*100));
    h+=`<div class="goal"><div style="display:flex;justify-content:space-between;font-size:14px">
      <span>🎯 Ціль: <b>${fmtW(g)} кг</b></span><span><b>${fmtW(prW.w)}</b> / ${fmtW(g)} · ${pct}%</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      ${pct>=100?`<div style="margin-top:6px" class="up">🏆 Ціль взята! Постав нову.</div>`:''}
    </div>`;
  }
  h+=`<div style="height:10px"></div>
    <button class="btn ghost small" onclick="setGoal('${esc(ex)}')">${g?'Змінити ціль':'🎯 Поставити ціль'}</button></div>`;
  h+=`<div class="card"><h3>Макс вага по тренуваннях, кг</h3>${
    lineChart(sess.map(s=>({d:s.d,y:s.maxW,base:s.base})),'кг',{goal:g})}
    <div class="hint">Зелена точка — рекорд (PR)${g?', пунктир — твоя ціль':''}. Сіра — до перерви.</div></div>`;
  h+=`<div class="card"><h3>Оцінка 1ПМ по тренуваннях, кг</h3>${
    lineChart(sess.map(s=>({d:s.d,y:s.best1,base:s.base})),'кг')}</div>`;
  h+=`<div class="card"><h3>Сесії</h3>`;
  [...sess].reverse().forEach(s=>{
    h+=`<div class="stat"><span>${fmtD(s.d)}${s.base?' <span class="badge">до перерви</span>':''}<br>
      <span class="hint">${s.sets.map(x=>fmtW(x.w)+'×'+x.r).join(', ')}</span></span>
      <b>${fmtN(s.ton)} кг</b></div>`;
  });
  h+=`</div>`;
  return h;
}
function setGoal(ex){
  const v=prompt('Ціль по вазі для «'+ex+'», кг (порожнє — прибрати):', S.goals[ex]||'');
  if(v===null) return;
  const n=parseFloat(String(v).replace(',','.'));
  if(!n) delete S.goals[ex]; else S.goals[ex]=n;
  save(); render();
}

/* ---------- тренер ---------- */
let chatBusy=false, chatPoll=0;
function vCoach(){
  let h='';
  if(!S.syncUrl){
    return `<div class="empty">Щоб тренер запрацював, спершу підключи синхронізацію з таблицею («Ще» → Синхронізація) 🙂</div>`;
  }
  h+=`<div class="card"><h3>🤖 Claude — твій тренер</h3>
    <div class="hint">Пиши питання — я читаю їх разом із твоїм журналом і відповідаю зазвичай до вечора. Про техніку, програму, харчування, коліно — питай що завгодно.</div></div>`;
  h+=`<div class="chatwrap">`;
  if(!S.chat.length){
    h+=`<div class="msg ai">Привіт, Денисе! Я твій тренер. Питай про програму, ваги, техніку чи харчування — я бачу весь твій журнал 💪</div>`;
  }
  S.chat.slice(-60).forEach(m=>{
    h+=`<div class="msg ${m.who}">${escH(m.t)}${m.ts?`<span class="mt">${new Date(m.ts).toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>`:''}</div>`;
  });
  if(chatBusy) h+=`<div class="msg ai">…</div>`;
  h+=`</div>
  <div class="chatin">
    <input class="txt" id="chIn" placeholder="Напиши тренеру…" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn small" onclick="sendChat()">➤</button>
  </div>`;
  return h;
}
function sendChat(){
  const el=document.getElementById('chIn');
  const t=(el.value||'').trim();
  if(!t || chatBusy) return;
  el.value='';
  S.chat.push({who:'me', t, ts:Date.now()});
  syncPost({action:'ask', text:t}).then(j=>{
    if(!(j&&j.ok)) throw 0;
    S.chat.push({who:'sys', t:'✉️ Надіслано тренеру. Відповідь з\'явиться тут — зазвичай до вечора.', ts:Date.now()});
  }).catch(()=>{
    S.chat.push({who:'sys', t:'⚠️ Не вдалося надіслати. Перевір інтернет і надішли ще раз.', ts:Date.now()});
  }).finally(()=>{ save(); render(); });
}
function pollChat(){
  if(!S.syncUrl) return;
  if(Date.now()-chatPoll < 60*1000) return;
  chatPoll=Date.now();
  fetch(S.syncUrl+'?q=chat').then(r=>r.json()).then(j=>{
    if(!(j&&j.ok&&j.rows)) return;
    let added=false;
    j.rows.forEach(row=>{
      if(row.who==='a' && row.ts>S.lastChatTs){
        S.chat.push({who:'ai', t:row.text, ts:row.ts});
        S.lastChatTs=row.ts; added=true;
      }
    });
    if(added){ save(); if(view==='coach') render(); }
  }).catch(()=>{});
}

    <div class="hint" style="margin-top:6px">${S.restAuto
      ?'Авто-режим сам підбирає відпочинок під вправу: важка база (жим, тяги, жим ногами) — 2:30–3:00, ізоляція (біцепс, махи) — 1:30, прес — 1:00. Для своїх вправ — фіксований час ('+mmss(S.rest)+').'
      :'Один час для всіх вправ.'} Таймер стартує сам після підходу, сигнал продзвенить і сам затихне.</div>
  </div>`;
  h+=`<div class="card"><h3>Вага тіла</h3>
    <div class="row"><input class="txt" id="bwIn" inputmode="decimal" placeholder="кг, напр. 75,4">
    <button class="btn small" style="flex:0 0 110px" onclick="addBw()">Записати</button></div>
    <div style="height:8px"></div>`;
  bw.slice(0,8).forEach(b=>{
    const dS = first? Math.round((b.kg-first.kg)*10)/10 : 0;
    h+=`<div class="stat"><span>${fmtD(b.d)}</span><b>${fmtW(b.kg)} кг <small style="color:${dS<=0?'var(--ok)':'var(--bad)'};font-weight:600">${dS>0?'+':''}${dS}</small></b></div>`;
  });
  h+=`</div>`;
  // синхронізація
  h+=`<div class="card"><h3>Синхронізація з Google Таблицею</h3>`;
  if(!S.syncUrl){
    h+=`<div class="hint" style="margin-bottom:10px">Встав сюди URL веб-апки Apps Script (…/exec) — і кожен підхід сам летітиме в таблицю. Як його отримати — інструкція в чаті з Claude.</div>
    <input class="txt" id="suIn" placeholder="https://script.google.com/macros/s/…/exec">
    <div style="height:8px"></div>
    <button class="btn small" onclick="setSyncUrl()">Підключити</button>`;
  } else {
    h+=`<div class="stat"><span>Статус</span><b class="up">✅ підключено</b></div>
    <div class="stat"><span>У черзі на відправку</span><b>${S.pending.length}</b></div>
    <div class="stat"><span>Остання синхронізація</span><b>${S.lastSync?new Date(S.lastSync).toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—'}</b></div>
    ${S.dirty?`<div class="hint" style="color:var(--warn);margin-top:6px">⚠️ Ти редагував/видаляв записи — натисни «Повна пересинхронізація», щоб таблиця стала точною копією апки.</div>`:''}
    <div style="height:10px"></div>
    <div class="row">
      <button class="btn ghost small" onclick="trySync();render()">↻ Відправити чергу</button>
      <button class="btn ghost small" id="fsBtn" onclick="fullSync()">⟳ Повна пересинхр.</button>
    </div>
    <div style="height:8px"></div>
    <button class="btn ghost small" style="color:var(--bad)" onclick="if(confirm('Відключити синхронізацію?')){S.syncUrl='';S.pending=[];S.dirty=false;save();render();}">Відключити</button>`;
  }
  h+=`</div>
  <div class="card"><h3>Дані</h3>
    <div class="hint" style="margin-bottom:10px">Все автоматично зберігається в Google Таблиці — вона і є твій бекап. Якщо зміниш телефон чи почистиш Safari — просто підключи синхронізацію і натисни цю кнопку.</div>
    <button class="btn ghost small" onclick="restoreFromSheet()">📥 Відновити історію з таблиці</button>
    <div style="height:8px"></div>
    <button class="btn ghost small" style="color:var(--bad)" onclick="wipe()">Стерти всі дані на телефоні</button>
  </div>
  <div class="hint" style="text-align:center;padding:4px">Зроблено для Дениса 💪 v1.7</div>`;
  return h;
}
function restAdj(dv){ S.rest=Math.max(15,Math.min(600,S.rest+dv)); save(); render(); }
function addBw(){
  const v=parseFloat(document.getElementById('bwIn').value.replace(',','.'));
  if(!v) return;
  S.bw = S.bw.filter(b=>b.d!==todayISO());
  S.bw.push({d:todayISO(),kg:v});
  if(S.syncUrl){ S.pending.push({t:'bw', d:todayISO(), kg:v}); }
  save(); render(); trySync();
}
function restoreFromSheet(){
  if(!S.syncUrl){ alert('Спершу підключи синхронізацію (URL таблиці) вище.'); return; }
  if(!confirm('Замінити дані на телефоні тим, що зараз у таблиці?')) return;
  fetch(S.syncUrl+'?q=data').then(r=>r.json()).then(j=>{
    if(!(j&&j.ok&&j.sets)) throw 0;
    S.sets = j.sets.map(v=>({
      d:v[0], ex:String(v[1]), w:+v[3]||0, r:+v[4]||0,
      knee: v[5]?String(v[5]):null,
      base: String(v[6]||'').includes('до перерви')?1:undefined }));
    S.bw = (j.bw||[]).map(v=>({d:v[0], kg:+v[1]||0}));
    S.pending=[]; S.dirty=false; save(); render();
    alert('Відновлено: '+S.sets.length+' підходів, '+S.bw.length+' записів ваги.');
  }).catch(()=>alert('Не вдалося прочитати таблицю. Перевір інтернет і URL.'));
}
function wipe(){
  if(confirm('Точно стерти ВСЕ? Спершу зроби бекап!')){
    localStorage.removeItem(KEY); S=load(); save(); render();
  }
}

/* ---------- старт ---------- */
render();
trySync();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
